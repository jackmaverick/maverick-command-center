name: CI Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  wait-for-gate:
    name: Wait for policy gate
    runs-on: ubuntu-latest
    steps:
      - name: Wait for risk-policy-gate
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: risk-policy-gate
          ref: ${{ github.event.pull_request.head.sha }}
          timeoutSeconds: 300
          intervalSeconds: 15

  typecheck:
    name: Typecheck
    needs: [wait-for-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: Lint
    needs: [wait-for-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    needs: [wait-for-gate]
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build

  browser-evidence:
    name: Browser Evidence
    needs: [wait-for-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx tsx harness/scripts/capture-browser-evidence.ts
        env:
          BASE_URL: https://maverick-command-center.vercel.app
      - run: npx tsx harness/scripts/verify-browser-evidence.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browser-evidence
          path: .evidence/
          retention-days: 30

  smoke:
    name: harness-smoke
    needs: [typecheck, lint, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: echo "[pass] All upstream checks passed"
