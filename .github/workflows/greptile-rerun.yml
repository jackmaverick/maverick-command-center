name: Greptile Rerun

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  request-rerun:
    name: Request Greptile re-review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Request re-review with SHA dedup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npx tsx harness/scripts/rerun-review.ts
      - name: Re-trigger policy gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run risk-policy-gate.yml \
            --field pr_number=${{ github.event.pull_request.number }}
